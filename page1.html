let cart=[];
let total=0;
let searchTerm="";

function setSearch(val){
  searchTerm=val.toLowerCase();
  applyFilters();
}

function applyFilters(){
  let cat=document.getElementById("cat").value;
  let sort=document.getElementById("sort").value;

  let list=products.filter(p=>{
    return (cat==="all"||p.cat===cat) &&
    p.name.toLowerCase().includes(searchTerm);
  });

  if(sort==="low") list.sort((a,b)=>a.price-b.price);
  if(sort==="high") list.sort((a,b)=>b.price-a.price);
  if(sort==="rating") list.sort((a,b)=>b.rating-a.rating);

  display(list);
}

function display(list){
  document.getElementById("products").innerHTML=
  list.map(p=>`
    <div class="card">
      <img src="${p.img}">
      <div class="content">
        <div class="title">${p.name}</div>
        <div class="price">₹${p.price}</div>
        <div class="rating">⭐ ${p.rating}</div>
        <div class="stock">In Stock</div>
        <div class="desc">${p.desc}</div>
      </div>

      <!-- ONLY + / - CONTROLS -->
      <div style="display:flex;gap:5px;padding:10px;">
        <button onclick="decrease('${p.name}')" style="background:#ef4444;width:50%;">−</button>
        <button onclick="increase('${p.name}')" style="background:#22c55e;width:50%;">+</button>
      </div>

    </div>
  `).join("");
}

/* CART LOGIC (UNCHANGED) */

function increase(name){
  let item = products.find(p => p.name === name);
  let existing = cart.find(c => c.name === name);

  if(existing){
    existing.qty += 1;
    existing.totalPrice = existing.qty * existing.pricePerQty;
  } else {
    cart.push({
      name: item.name,
      qty: 1,
      pricePerQty: item.price,
      totalPrice: item.price
    });
  }

  updateCart();
}

function decrease(name){
  let existing = cart.find(c => c.name === name);
  if(!existing) return;

  existing.qty -= 1;

  if(existing.qty <= 0){
    cart = cart.filter(c => c.name !== name);
  } else {
    existing.totalPrice = existing.qty * existing.pricePerQty;
  }

  updateCart();
}

function updateCart(){
  total = cart.reduce((sum, c) => sum + c.totalPrice, 0);

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText = total;
}

function checkout(){
  if(cart.length===0){
    alert("Cart is empty 🌿");
    return;
  }

  localStorage.setItem("cartItems", JSON.stringify(cart));
  localStorage.setItem("cartTotal", total);

  window.location.href="payment.html";
}
